name: swiftsnipple

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}); do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET};
      exit 0;
      "

  api:
    image: golang:1.26.2
    working_dir: /app/apps/api
    command: sh -c "go run ./cmd/server"
    environment:
      API_PORT: ${API_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      MEMBER_SESSION_SECRET: ${MEMBER_SESSION_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      UPLOADS_DIR: ${UPLOADS_DIR}
      UPLOADS_BASE_PATH: ${UPLOADS_BASE_PATH}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - go_pkg_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    ports:
      - "${API_PORT}:${API_PORT}"

  web:
    image: node:20
    working_dir: /app/apps/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${WEB_PORT}"
    environment:
      WEB_PORT: ${WEB_PORT}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET}
    depends_on:
      - api
    volumes:
      - ./:/app
      - web_node_modules:/app/apps/web/node_modules
    ports:
      - "${WEB_PORT}:${WEB_PORT}"

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
  go_pkg_cache:
  go_build_cache:
