name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  core-gates:
    runs-on: macos-latest

    env:
      DATABASE_URL: postgres://swiftsnippet:swiftsnippet@127.0.0.1:5432/swiftsnippet?sslmode=disable
      HOMEBREW_NO_AUTO_UPDATE: 1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Install Swift and PostgreSQL tools
        run: |
          brew install swiftlint
          brew install postgresql@16
          echo "$(brew --prefix postgresql@16)/bin" >> "$GITHUB_PATH"

      - name: Start PostgreSQL
        env:
          PGDATA: ${{ runner.temp }}/pgdata
        run: |
          export PATH="$(brew --prefix postgresql@16)/bin:$PATH"
          initdb -D "$PGDATA" --username=swiftsnippet --auth=trust
          pg_ctl -D "$PGDATA" -l "$RUNNER_TEMP/postgres.log" -o "-F -p 5432" start
          createdb -h 127.0.0.1 -p 5432 -U swiftsnippet swiftsnippet
          pg_isready -h 127.0.0.1 -p 5432 -U swiftsnippet -d swiftsnippet

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Run core gates
        run: pnpm check
