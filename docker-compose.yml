name: swiftsnipple

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: golang:1.24.4
    working_dir: /app/apps/api
    command: sh -c "go run ./cmd/server"
    environment:
      API_PORT: ${API_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      - go_pkg_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    ports:
      - "${API_PORT}:${API_PORT}"

  web:
    image: node:20
    working_dir: /app/apps/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${WEB_PORT}"
    environment:
      WEB_PORT: ${WEB_PORT}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET}
    depends_on:
      - api
    volumes:
      - ./:/app
      - web_node_modules:/app/apps/web/node_modules
    ports:
      - "${WEB_PORT}:${WEB_PORT}"

volumes:
  postgres_data:
  web_node_modules:
  go_pkg_cache:
  go_build_cache:
